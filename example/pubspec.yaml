name: all_box_example
description: Example app demonstrating the all_box package.
publish_to: "none"
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  all_box:
    path: ../
  # Only the *example app* depends on path_provider. AllBox itself never
  # does — see AllBox.init's `path` parameter and the README section
  # "Erros de path/plugin evitados".
  path_provider: ^2.1.0

  # Competitors below exist ONLY for the on-device benchmark screen
  # (lib/benchmark/). The `all_box` package itself stays dependency-free.
  #
  # **PT-BR:** Os concorrentes abaixo existem SÓ para a tela de benchmark
  # no dispositivo (lib/benchmark/). O pacote `all_box` em si continua
  # sem dependências.
  hive: ^2.2.3
  shared_preferences: ^2.3.0
  flutter_test:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
