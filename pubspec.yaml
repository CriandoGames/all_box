name: all_box
description: >
  Synchronous, lightweight key-value storage for Flutter with crash-safe
  writes (write-ahead + atomic rename) and a pure-Flutter reactive layer.
version: 0.2.1
homepage: https://github.com/CriandoGames/all_box
repository: https://github.com/CriandoGames/all_box
issue_tracker: https://github.com/CriandoGames/all_box/issues
topics:
  - storage
  - key-value
  - persistence
  - cache

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
