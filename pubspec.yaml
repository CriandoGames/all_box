name: all_box
description: >
  Synchronous, lightweight key-value storage with crash-safe writes
  (write-ahead + atomic rename)
version: 1.0.0-beta.2
homepage: https://github.com/CriandoGames/all_box
repository: https://github.com/CriandoGames/all_box
issue_tracker: https://github.com/CriandoGames/all_box/issues
topics:
  - storage
  - key-value
  - persistence
  - cache

environment:
  # >=3.3.0 because the Web storage backend uses `dart:js_interop` extension
  # types (stabilized in Dart 3.3), which don't compile on earlier SDKs.
  sdk: ">=3.3.0 <4.0.0"

dev_dependencies:
  test: ">=1.25.0 <1.25.8"
  lints: ^3.0.0
  file: ^7.0.0
  frontend_server_client: ^4.0.0
  pub_semver: ^2.1.4
  watcher: ^1.1.0
